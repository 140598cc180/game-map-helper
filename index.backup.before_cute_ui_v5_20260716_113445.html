<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#fff1f7">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="地图助手" />
  <title>第五人格地图小助手</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
  <link rel="icon" href="./assets/icons/icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <button id="backBtn" class="icon-btn hidden" aria-label="返回">←</button>
      <div>
        <h1 id="pageTitle">游戏地图助手</h1>
        <p id="pageSubtitle">选择方向后查看对应地图</p>
      </div>
      <button id="installBtn" class="install-btn hidden">安装</button>
    </header>

    <main id="main" class="main"></main>
  </div>

  <div id="viewer" class="viewer hidden" role="dialog" aria-modal="true">
    <div class="viewer-toolbar">
      <button id="viewerClose" class="viewer-btn">关闭</button>
      <div id="viewerTitle" class="viewer-title"></div>
      <button id="viewerReset" class="viewer-btn">适应</button>
    </div>
    <div id="viewerStage" class="viewer-stage">
      <img id="viewerImg" alt="详细地图" />
    </div>
  </div>

  <script src="./app.js?v=cute-ui-v4"></script>
</body>
</html>
